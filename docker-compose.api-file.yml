services:
  pos_proxy:
    image: caddy:2-alpine
    container_name: pos_proxy
    restart: unless-stopped
    env_file:
      - /opt/pos/.env
    ports:
      - "${HTTP_PUBLIC_PORT:-80}:80"
      - "${HTTPS_PUBLIC_PORT:-443}:443"
    volumes:
      - ./deploy/digitalocean/Caddyfile:/etc/caddy/Caddyfile:ro
      - pos_caddy_data:/data
      - pos_caddy_config:/config
    depends_on:
      - pos_api
      - pos_file
      - pos_report
    networks:
      - pos

  pos_api:
    build:
      context: ./api-v4
      dockerfile: Dockerfile.prod
    container_name: pos_api
    restart: unless-stopped
    env_file:
      - /opt/pos/.env
    environment:
      PORT: 3000
      FILE_BASE_URL: ${FILE_BASE_URL:-http://pos_file:8080}
      JS_BASE_URL: ${JS_BASE_URL:-http://pos_report:5488}
    ports:
      - "${API_PUBLIC_PORT:-8990}:3000"
    depends_on:
      - pos_file
      - pos_report
    networks:
      - pos

  pos_file:
    build:
      context: ./file-v3
      dockerfile: Dockerfile.prod
    container_name: pos_file
    restart: unless-stopped
    env_file:
      - /opt/pos/.env
    environment:
      PORT: 8080
    ports:
      - "${FILE_PUBLIC_PORT:-8080}:8080"
    volumes:
      - pos_file_uploads:/app/public/uploads
    networks:
      - pos

  pos_report:
    image: ${JSREPORT_IMAGE:-jsreport/jsreport:latest}
    container_name: pos_report
    restart: unless-stopped
    environment:
      extensions_authentication_admin_username: ${JS_USERNAME:-admin}
      extensions_authentication_admin_password: ${JS_PASSWORD}
      extensions_authentication_cookieSession_secret: ${JS_SESSION_SECRET}
      chrome_launchOptions_args: --no-sandbox
    ports:
      - "${REPORT_PUBLIC_PORT:-5488}:5488"
    volumes:
      - pos_report_data:/app/data
    networks:
      - pos

networks:
  pos:
    name: pos

volumes:
  pos_caddy_data:
  pos_caddy_config:
  pos_file_uploads:
  pos_report_data:
